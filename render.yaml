services:
  - type: web
    name: smart-battle-report-backend
    env: docker
    dockerfilePath: ./deploy/Dockerfile.backend
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: minimax
      - key: MINIMAX_API_KEY
        sync: false  # 需要在 Render Dashboard 手动设置
      - key: KIMI_API_KEY
        sync: false  # 需要在 Render Dashboard 手动设置
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /api/health
